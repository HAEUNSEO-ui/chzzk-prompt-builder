<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHZZK Isometric Prompt Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f4f2;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a66;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --accent: #1a9662;
    --accent-light: #e6f7f2;
    --accent-mid: #1a9662;
    --accent-text: #0d4d32;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Fraunces', serif;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe9;
      --text-secondary: #8a8980;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --accent-light: #0d4d32;
      --accent-text: #a3dece;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-mono);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 0;
  }

  .page {
    width: 100%;
    max-width: 680px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1.25rem 1rem;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  .header svg {
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .header-icon {
    width: 34px; height: 34px;
    background: var(--accent-light);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
  }

  .header-icon i { font-size: 17px; color: var(--accent); }

  .header h1 {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .header-meta {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  .progress-dot {
    height: 3px;
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
  }
  .progress-dot.done { background: var(--accent); }
  .progress-dot.current { background: var(--accent-mid); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-right: 4px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }

  .msg-label {
    font-size: 11px;
    color: var(--text-secondary);
    padding: 0 4px;
  }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.65;
  }

  .bot .bubble {
    background: var(--bg-secondary);
    color: var(--text-primary);
    border: 0.5px solid var(--border);
    border-radius: 4px 16px 16px 16px;
  }

  .bot .bubble strong { color: var(--accent); font-weight: 500; }
  .bot .bubble .sub { font-size: 12px; color: var(--text-secondary); display: block; margin-top: 3px; }

  .user .bubble {
    background: var(--accent-light);
    color: var(--accent-text);
    border-radius: 16px 4px 16px 16px;
    font-weight: 500;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    max-width: 90%;
  }

  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-family: var(--font-mono);
    border: 0.5px solid var(--border-hover);
    background: var(--bg);
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--accent-light);
    border-color: var(--accent-mid);
    color: var(--accent-text);
  }

  .chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
    margin-top: 0.5rem;
    flex-shrink: 0;
  }

  .text-input {
    flex: 1;
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--accent-mid); }
  .text-input::placeholder { color: var(--text-secondary); }

  .send-btn {
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--font-mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }

  .send-btn:hover { background: #157a4e; }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { background: var(--border); cursor: default; }

  .result-box {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px 14px 16px;
    font-size: 12px;
    line-height: 1.9;
    color: var(--text-primary);
    font-family: var(--font-mono);
    margin-top: 4px;
    position: relative;
    white-space: pre-wrap;
    word-break: break-word;
    padding-top: 36px;
  }

  .result-label {
    position: absolute;
    top: 12px; left: 16px;
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .highlight { color: var(--accent); font-weight: 500; }

  .copy-btn {
    position: absolute;
    top: 8px; right: 10px;
    padding: 5px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--bg);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .copy-btn:hover { color: var(--text-primary); border-color: var(--accent-mid); }

  .restart-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .restart-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }

  @media (max-width: 480px) {
    .page { padding: 1rem 1rem 0.75rem; }
    .bubble { max-width: 92%; font-size: 13px; }
    .chips { max-width: 100%; }
  }
</style>
</head>

      headphones:   'no tiny control buttons, no wire details, no complex hinge mechanism',
      laptop:       'no tiny keyboard keys, no ports, no sticker details, no screen bezel details',
      plant:        'no many small leaves, no soil texture, no complex root details',
      'chess piece':'no fine carved details, no chess board markings',
      bicycle:      'no chain details, no spoke details, no gear mechanism',
    },
  },
  {
    key: 'COLOR',
    type: 'color',
    question: '어떤 컬러 테마를 선택할까요?',
    sub: '프리셋을 선택하거나, hex 코드를 직접 입력하세요.',
    presets: [
      { label: 'ocean blue',      hex: ['#B5D4F4', '#378ADD', '#185FA5'], name: 'ocean blue' },
      { label: 'coral red',       hex: ['#F5C4B3', '#D85A30', '#993C1D'], name: 'coral red' },
      { label: 'forest green',    hex: ['#C0DD97', '#639922', '#3B6D11'], name: 'forest green' },
      { label: 'lavender purple', hex: ['#CECBF6', '#7F77DD', '#534AB7'], name: 'lavender purple' },
      { label: 'warm amber',      hex: ['#FAC775', '#BA7517', '#854F0B'], name: 'warm amber' },
      { label: 'dusty rose',      hex: ['#F4C0D1', '#D4537E', '#993556'], name: 'dusty rose pink' },
      { label: 'mint teal',       hex: ['#9FE1CB', '#1D9E75', '#0F6E56'], name: 'mint teal' },
      { label: 'slate gray',      hex: ['#D3D1C7', '#888780', '#5F5E5A'], name: 'slate gray' },
    ],
  },
  {
    key: 'VIEW',
    question: '어떤 시점(뷰)으로 볼까요?',
    sub: '아이소메트릭 3D 뷰 방향을 선택하세요.',
    chips: [
      'Front-left isometric view, slightly elevated angle',
      'Front-right isometric view, slightly elevated angle',
      'Top-down isometric view, looking straight down-left',
      'Three-quarter front isometric view',
    ],
  }
];

let stepIdx = 0;
let answers = {};
let inDetailStep = false;
let currentDetailKey = null;

const chat = document.getElementById('chat');
const txt = document.getElementById('txt');
const progress = document.getElementById('progress');
const stepLabel = document.getElementById('step-label');

function updateProgress() {
  const total = STEPS.length;
  progress.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i < stepIdx ? ' done' : i === stepIdx ? ' current' : '');
    progress.appendChild(d);
  }
  stepLabel.textContent = stepIdx >= total ? '완료 ✓' : `${stepIdx + 1} / ${total}`;
}

function addMsg(role, html, chips, onChip) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = role === 'bot' ? '그래픽 도우미' : 'you';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  msg.appendChild(lbl);
  msg.appendChild(bubble);

  if (chips && chips.length) {
    const chipWrap = document.createElement('div');
    chipWrap.className = 'chips';
    chips.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = c;
      btn.onclick = () => {
        document.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
        btn.classList.add('selected');
        txt.value = c;
        if (onChip) onChip(c);
        setTimeout(() => handleInput(c), 150);
      };
      chipWrap.appendChild(btn);
    });
    msg.appendChild(chipWrap);
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

let colorHexInputs = { light: '', main: '', dark: '', name: '' };

function hexToName(hex) {
  const h = hex.replace('#','').toLowerCase();
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const l = (max+min)/2/255;
  const s = max===min ? 0 : (max-min)/(255-Math.abs(2*255*l-255));
  const h2 = max===min ? 0 : max===r ? ((g-b)/(max-min)+6)%6*60 : max===g ? (b-r)/(max-min)*60+120 : (r-g)/(max-min)*60+240;
  if (s < 0.12) return l > 0.7 ? 'near-white' : l > 0.4 ? 'medium gray' : 'dark gray';
  const hues = [[15,'red'],[45,'orange'],[70,'yellow'],[150,'green'],[185,'teal'],[255,'blue'],[285,'purple'],[330,'pink'],[360,'red']];
  const hname = hues.find(([t]) => h2 <= t)?.[1] || 'red';
  const lname = l > 0.82 ? 'very light' : l > 0.65 ? 'light' : l > 0.45 ? 'medium' : l > 0.28 ? 'deep' : 'dark';
  return `${lname} ${hname}`;
}

function renderColorStep(step) {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = '그래픽 도우미';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `${step.question}<span class="sub">${step.sub}</span>`;
  msg.appendChild(lbl);
  msg.appendChild(bubble);

  const presetWrap = document.createElement('div');
  presetWrap.className = 'chips';
  presetWrap.style.maxWidth = '100%';
  step.presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.style.display = 'flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '6px';
    const dots = document.createElement('span');
    dots.style.cssText = 'display:flex;gap:2px;';
    p.hex.forEach(c => {
      const d = document.createElement('span');
      d.style.cssText = `width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;border:0.5px solid rgba(0,0,0,0.1)`;
      dots.appendChild(d);
    });
    btn.appendChild(dots);
    btn.appendChild(document.createTextNode(p.label));
    btn.onclick = () => {
      presetWrap.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      colorHexInputs.name = p.name;
      ['light','main','dark'].forEach((k,i) => {
        colorHexInputs[k] = p.hex[i];
        const inp = document.getElementById('hex-'+k);
        if (inp) { inp.value = p.hex[i]; inp.style.borderColor = p.hex[i]; updateSwatch(k, p.hex[i]); }
      });
    };
    presetWrap.appendChild(btn);
  });
  msg.appendChild(presetWrap);

  const hexUI = document.createElement('div');
  hexUI.style.cssText = 'margin-top:12px;display:flex;flex-direction:column;gap:8px;max-width:90%';

  const roles = [
    { id:'light', label:'Top planes', desc:'윗면 — 가장 밝은 톤' },
    { id:'main',  label:'Main planes', desc:'정면 — 대표 색상' },
    { id:'dark',  label:'Side planes', desc:'측면 — 가장 어두운 톤' },
  ];

  roles.forEach(({id, label, desc}) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;';

    const swatch = document.createElement('span');
    swatch.id = 'swatch-'+id;
    swatch.style.cssText = 'width:22px;height:22px;border-radius:5px;border:0.5px solid var(--border-hover);background:#eee;flex-shrink:0;transition:background 0.2s';

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.id = 'hex-'+id;
    inp.className = 'text-input';
    inp.style.cssText = 'width:110px;flex:none;font-size:12px;padding:6px 10px;font-family:var(--font-mono);transition:border-color 0.2s;';
    inp.placeholder = '#RRGGBB';
    inp.maxLength = 7;
    inp.value = colorHexInputs[id] || '';
    if (colorHexInputs[id]) { inp.style.borderColor = colorHexInputs[id]; swatch.style.background = colorHexInputs[id]; }

    inp.addEventListener('input', () => {
      let v = inp.value.trim();
      if (!v.startsWith('#')) v = '#'+v;
      inp.value = v.slice(0,7);
      colorHexInputs[id] = inp.value;
      if (/^#[0-9A-Fa-f]{6}$/.test(inp.value)) {
        updateSwatch(id, inp.value);
        inp.style.borderColor = inp.value;
      } else {
        swatch.style.background = '#eee';
        inp.style.borderColor = 'var(--border-hover)';
      }
    });

    inp.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });

    const lbl2 = document.createElement('span');
    lbl2.style.cssText = 'display:flex;flex-direction:column;gap:1px;';
    lbl2.innerHTML = `<span style="font-size:11px;color:var(--text-primary);font-weight:500">${label}</span><span style="font-size:10px;color:var(--text-secondary)">${desc}</span>`;

    row.appendChild(swatch);
    row.appendChild(inp);
    row.appendChild(lbl2);
    hexUI.appendChild(row);
  });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'send-btn';
  confirmBtn.style.cssText = 'margin-top:4px;align-self:flex-start;padding:8px 16px;font-size:12px;';
  confirmBtn.innerHTML = '컬러 확정';
  confirmBtn.onclick = () => {
    const l = colorHexInputs.light, m = colorHexInputs.main, d = colorHexInputs.dark;
    if (!/^#[0-9A-Fa-f]{6}$/.test(l) || !/^#[0-9A-Fa-f]{6}$/.test(m) || !/^#[0-9A-Fa-f]{6}$/.test(d)) {
      confirmBtn.style.background = '#c0392b';
      confirmBtn.textContent = '⚠ hex 코드를 확인해주세요';
      setTimeout(() => { confirmBtn.innerHTML = '컬러 확정'; confirmBtn.style.background = ''; }, 1800);
      return;
    }
    const name = colorHexInputs.name || hexToName(m);
    answers['COLOR'] = name;
    answers['LIGHT_COLOR'] = `${hexToName(l)} (${l})`;
    answers['MAIN_COLOR'] = `${hexToName(m)} (${m})`;
    answers['DARK_COLOR'] = `${hexToName(d)} (${d})`;
    const summary = `${name} — ${l} / ${m} / ${d}`;
    addMsg('user', `<span style="display:flex;align-items:center;gap:8px">${[l,m,d].map(c=>`<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${c};border:0.5px solid rgba(0,0,0,0.15)"></span>`).join('')}${summary}</span>`);
    stepIdx++;
    setTimeout(askStep, 400);
  };
  hexUI.appendChild(confirmBtn);
  msg.appendChild(hexUI);

  document.getElementById('input-row').style.display = 'none';
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function updateSwatch(id, hex) {
  const s = document.getElementById('swatch-'+id);
  if (s) s.style.background = hex;
}

function askStep() {
  const step = STEPS[stepIdx];
  if (!step) { showResult(); return; }
  updateProgress();

  if (step.type === 'color') {
    colorHexInputs = { light: '', main: '', dark: '', name: '' };
    document.getElementById('input-row').style.display = 'none';
    renderColorStep(step);
    return;
  }

  document.getElementById('input-row').style.display = 'flex';
  txt.placeholder = '직접 입력하거나 위 옵션을 선택하세요';
  txt.value = '';
  addMsg('bot', `${step.question}<span class="sub">${step.sub}</span>`, step.chips);
}

let detailSelectedChips = [];

function askDetailStep(step, value) {
  inDetailStep = true;
  currentDetailKey = step.detail_key;
  detailSelectedChips = [];

  document.getElementById('input-row').style.display = 'none';

  const msg = document.createElement('div');
  msg.className = 'msg bot';

  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = '그래픽 도우미';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = step.detail_fn(value);

  msg.appendChild(lbl);
  msg.appendChild(bubble);

  const chips = step.detail_chips_fn(value);
  const chipWrap = document.createElement('div');
  chipWrap.className = 'chips';
  chipWrap.style.maxWidth = '90%';

  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = c;
    btn.onclick = () => {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        detailSelectedChips = detailSelectedChips.filter(x => x !== c);
      } else {
        btn.classList.add('selected');
        detailSelectedChips.push(c);
      }
    };
    chipWrap.appendChild(btn);
  });
  msg.appendChild(chipWrap);

  const extraWrap = document.createElement('div');
  extraWrap.style.cssText = 'display:flex;gap:8px;margin-top:10px;max-width:90%';

  const extraInput = document.createElement('input');
  extraInput.type = 'text';
  extraInput.className = 'text-input';
  extraInput.placeholder = step.detail_placeholder || '추가 설명 입력 (선택사항)';
  extraInput.style.cssText = 'flex:1;font-size:13px;';
  extraInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); confirmDetail(); } });

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'send-btn';
  confirmBtn.style.cssText = 'padding:8px 14px;font-size:12px;white-space:nowrap;';
  confirmBtn.innerHTML = '확정';
  confirmBtn.onclick = confirmDetail;

  function confirmDetail() {
    const extra = extraInput.value.trim();
    const parts = [...detailSelectedChips, ...(extra ? [extra] : [])];
    const combined = parts.length ? parts.join(', ') : '';

    if (combined) addMsg('user', combined);
    else addMsg('user', '<em style="opacity:0.5">건너뜀</em>');

    answers[currentDetailKey] = combined || `clearly recognizable ${answers['OBJECT']} shape`;
    const objStep = STEPS.find(s => s.key === 'OBJECT');
    if (objStep && objStep.avoid_map) {
      answers['OBJECT_AVOID'] = objStep.avoid_map[answers['OBJECT']] || 'no tiny details, no many small surface cuts';
    }
    inDetailStep = false;
    currentDetailKey = null;
    detailSelectedChips = [];
    stepIdx++;
    document.getElementById('input-row').style.display = 'flex';
    setTimeout(askStep, 400);
  }

  extraWrap.appendChild(extraInput);
  extraWrap.appendChild(confirmBtn);
  msg.appendChild(extraWrap);

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function submitText() {
  const val = txt.value.trim();
  handleInput(val);
}

txt.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });

function handleInput(val) {
  if (inDetailStep) return; // handled by confirmDetail in askDetailStep UI

  if (!val) return;

  addMsg('user', val);
  txt.value = '';

  const step = STEPS[stepIdx];
  answers[step.key] = val;

  if (step.key === 'OBJECT' && step.detail_key) {
    setTimeout(() => askDetailStep(step, val), 400);
    return;
  }

  stepIdx++;
  setTimeout(askStep, 400);
}

function buildPrompt() {
  const obj = answers['OBJECT'] || 'object';
  const shape = answers['OBJECT_SHAPE'] || `clearly recognizable ${obj} shape`;
  const avoid = answers['OBJECT_AVOID'] || 'no tiny details, no many small surface cuts';
  const color = answers['COLOR'] || 'blue';
  const light = answers['LIGHT_COLOR'] || 'light ' + color;
  const main  = answers['MAIN_COLOR']  || color;
  const dark  = answers['DARK_COLOR']  || 'dark ' + color;
  const view  = answers['VIEW'] || 'Front-left isometric view, slightly elevated angle';

  return `A single ${color} ${obj}, isolated on a pure white background.
Create it as a simplified geometric isometric 3D icon, not a noisy low-poly mesh.
The object is built from a small number of large solid panels and clean bevel planes.
Use only intentional structural planes that match the ${obj}'s form.
Surfaces should feel smooth-looking but still geometric, divided into a limited number of broad clean planes.
Each plane must align with the ${obj} structure and fit together precisely like a carefully modeled hard-surface icon.
Add subtle rounded edges and soft corner radius between planes, so the transitions feel slightly softened rather than razor-sharp.
Keep the faceted polygon structure clearly visible, but give the edges a gentle softened bevel.
The ${obj} should be made of broad clean polygon planes, not smooth clay-like surfaces.
The object should have a bold, clean, and readable silhouette.
Keep the form simple, iconic, and structurally clear.
The ${obj} should be clearly recognizable, with ${shape}.
Use toy-like proportions: chunky, compact, playful, slightly exaggerated, like a collectible toy ${obj}.
Avoid realistic proportions.
Keep the details simplified but clearly visible.
Use medium detail: not ultra-minimal, not realistic.
Include the key parts of the ${obj}, and keep each part large, clean, and readable.
Add a few large object-defining details, but keep them simplified, chunky, geometric, and structurally intentional.
Do not add lots of tiny technical details, but do not reduce the object to an overly abstract shape.
Avoid random triangular facets.
Avoid decorative polygon breakup.
Avoid too many tiny surface cuts.
Avoid razor-sharp edges and overly hard transitions between planes.
Avoid overly smooth blob-like shapes.
Avoid losing the faceted polygon plane structure.
Use visibly thicker bevels and chamfers throughout the object. Even the thinnest bevels should be broad, substantial, and clearly readable, not hairline-thin. Every bevel must read as a real geometric plane with noticeable width. Prefer chunky, simplified bevels over delicate micro-bevels. Avoid razor-thin edge slivers, narrow rim bevels, and tiny chamfer strips.
${view}. Centered object only.
Flat shaded vector-like 3D illustration with a bright overall appearance and low-contrast shading.
Use a clean bright ${color} palette, not muted or grayish.
Use 3 tones only:
${light} on top planes,
${main} on main planes,
${dark} on side planes.
Keep all tones bright, clear, and saturated.
The side planes should still look clearly ${color}, not shifted to a different hue.
Avoid muddy, gray, dull, or desaturated colors.
Avoid dark shadow colors that shift the hue.
Keep the polygon plane separation visible through clean flat tone changes, but avoid strong dark contrast.
Use flat shaded planes, not gradients.
No gray shading, no dark shadow modeling, no soft airbrush shading, no harsh light-dark separation.
Pure white background only, completely empty and featureless.
No floor, no wall, no horizon line, no gradient, no backdrop, no surface, no environmental lighting.
Show only the single ${obj} on a completely plain white background, with nothing else in the scene.
No shadow of any kind.
no random triangulation, no dense faceting, no noisy mesh, no excessive polygon count, no tiny facets, no surface pattern, no texture, no photorealism, no glossy surface, no gradients, no soft airbrush shading, no strong shadows, no dramatic lighting, no text, no logo, no background objects, no extra elements, no floor details, no backdrop details, no muddy colors, no gray cast, no dark shadows, no contact shadow, no cast shadow, no ambient shadow, no ground shadow, no drop shadow, no tiny technical details, no thin bevel lines, no micro-bevels, no razor-thin chamfers, no tiny edge slivers, no delicate narrow bevel strips, ${avoid}`;
}

function showResult() {
  document.getElementById('input-row').style.display = 'none';
  updateProgress();

  addMsg('bot', '완성됐어요! 아래 프롬프트를 복사해서 사용해보세요.<span class="sub">이 프롬프트는 <strong>ChatGPT</strong>와 <strong>Midjourney</strong>에 최적화되어 있어요.</span>');

  const resultWrap = document.createElement('div');
  resultWrap.className = 'msg bot';

  const lbl = document.createElement('div');
  lbl.className = 'msg-label';
  lbl.textContent = 'generated prompt';

  const box = document.createElement('div');
  box.className = 'result-box';

  const prompt = buildPrompt();

  const spanLabel = document.createElement('span');
  spanLabel.className = 'result-label';
  spanLabel.textContent = 'image generation prompt';
  box.appendChild(spanLabel);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> 복사';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(prompt).then(() => {
      copyBtn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> 복사됨!';
      setTimeout(() => { copyBtn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> 복사'; }, 2000);
    });
  };
  box.appendChild(copyBtn);

  const content = document.createElement('div');
  content.style.marginTop = '4px';
  content.innerHTML = prompt
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(A single|Simplified geometric|Toy-like proportions|Clearly recognizable|Built from|Pure white background|Bright low-contrast)/g,
      '<span class="highlight">$1</span>');
  box.appendChild(content);

  const newObjectBtn = document.createElement('button');
  newObjectBtn.className = 'restart-btn';
  newObjectBtn.style.cssText = 'background:#e6f7f2;color:#1a9662;border-color:#a3dece;font-weight:500;margin-top:10px;';
  newObjectBtn.innerHTML = '다른 오브젝트 생성하기';
  newObjectBtn.onclick = () => {
    stepIdx = 0; answers = {}; inDetailStep = false; currentDetailKey = null;
    colorHexInputs = { light: '', main: '', dark: '', name: '' };
    chat.innerHTML = '';
    document.getElementById('input-row').style.display = 'flex';
    updateProgress();
    setTimeout(() => {
      addMsg('bot', '다른 오브젝트로 새 프롬프트를 만들어볼게요!<span class="sub">오브젝트를 선택해주세요.</span>');
      setTimeout(askStep, 400);
    }, 100);
  };

  const copyAllBtn = document.createElement('button');
  copyAllBtn.className = 'restart-btn';
  copyAllBtn.style.cssText = 'background:#1a9662;color:white;border-color:#1a9662;font-weight:500;margin-top:10px;';
  copyAllBtn.innerHTML = '프롬프트 전체 복사하기';
  copyAllBtn.onclick = () => {
    navigator.clipboard.writeText(prompt).then(() => {
      copyAllBtn.innerHTML = '복사됐어요!';
      setTimeout(() => { copyAllBtn.innerHTML = '프롬프트 전체 복사'; }, 2000);
    });
  };

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;margin-top:0;flex-wrap:wrap;';
  btnRow.appendChild(copyAllBtn);
  btnRow.appendChild(newObjectBtn);

  resultWrap.appendChild(lbl);
  resultWrap.appendChild(box);
  resultWrap.appendChild(btnRow);
  chat.appendChild(resultWrap);
  chat.scrollTop = chat.scrollHeight;
}

function intro() {
  addMsg('bot', '안녕하세요! CHZZK 아이소메트릭 프롬프트를 만들어드릴게요.<span class="sub">몇 가지 질문에 답해주시면 완성 프롬프트를 생성해드립니다.</span>');
  setTimeout(askStep, 700);
}

updateProgress();
intro();
</script>
